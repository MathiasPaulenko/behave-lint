name: Lint Feature Files

on:
  push:
    paths:
      - "features/**"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "features/**"
      - ".github/workflows/lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install behave-lint
        run: pip install behave-lint

      - name: Run linter (console output)
        run: behave-lint features/ --fail-on warning

      - name: Run linter (SARIF for Code Scanning)
        run: behave-lint features/ --sarif --output-file behave-lint.sarif
        if: always()

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: behave-lint.sarif
